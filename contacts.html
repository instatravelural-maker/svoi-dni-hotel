<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты — CozyStay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="header">
        <div class="container header-flex">
            <div class="logo">
                <i data-lucide="key-round"></i>
                <span>CozyStay</span>
            </div>
            <nav class="nav">
                <a href="index.html">Главная</a>
                <a href="about.html">О Квартире</a>
                <a href="services.html">Услуги</a>
                <a href="booking.html">Цены</a>
                <a href="reviews.html">Отзывы</a>
                <a href="contacts.html" class="active">Контакты</a>
            </nav>
            <a href="booking.html" class="btn-dark">Забронировать</a>
        </div>
    </header>

    <main class="container page-content">
        <h1 class="section-title" style="text-align: left;">КОНТАКТЫ</h1>
        
        <div class="contacts-grid">
            <div class="contact-info-block">
                <div class="contact-item">
                    <i data-lucide="map-pin"></i>
                    <div>
                        <h3>Адрес</h3>
                        <p>г. Санкт-Петербург, ул. Марата, 15</p>
                    </div>
                </div>
                
                <div class="contact-item">
                    <i data-lucide="phone"></i>
                    <div>
                        <h3>Телефон</h3>
                        <p><a href="tel:+79991234567">+7 999 123-45-67</a></p>
                    </div>
                </div>

                <div class="contact-item">
                    <i data-lucide="mail"></i>
                    <div>
                        <h3>E-mail</h3>
                        <p><a href="mailto:booking@cozystay.ru">booking@cozystay.ru</a></p>
                    </div>
                </div>

                <div class="social-connect">
                    <h3>Напишите нам в мессенджеры:</h3>
                    <div class="social-icons-large">
                        <a href="#" title="WhatsApp"><i data-lucide="message-circle"></i></a>
                        <a href="#" title="Telegram"><i data-lucide="send"></i></a>
                    </div>
                </div>
            </div>

            <div class="map-container">
                <iframe src="https://yandex.ru/map-widget/v1/?ll=30.355325%2C59.929555&z=15&pt=30.355325%2C59.929555,pm2rdm" width="100%" height="450" frameborder="0" style="border-radius: 20px;"></iframe>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container footer-flex">
            <div class="footer-info">
                <div class="logo">CozyStay</div>
                <p>© 2026 Все права защищены</p>
            </div>
            <div class="footer-social">
                <i data-lucide="instagram"></i>
                <i data-lucide="send"></i>
                <i data-lucide="phone-call"></i>
            </div>
        </div>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
