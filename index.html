<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CozyStay — Апартаменты в Санкт-Петербурге</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="header">
        <div class="container header-flex">
            <div class="logo">
                <i data-lucide="key-round"></i>
                <span>CozyStay</span>
            </div>
            <nav class="nav">
                <a href="index.html">Главная</a>
                <a href="about.html">О Квартире</a>
                <a href="services.html">Сервис</a>
                <a href="checkin.html">Заселение</a>
                <a href="reviews.html">Отзывы</a>
                <a href="contacts.html">Контакты</a>
            </nav>
            <a href="booking.html" class="btn-dark">Забронировать</a>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <div class="hero-card">
                <h1>ВАШ УЮТНЫЙ УГОЛОК <br> В САНКТ-ПЕТЕРБУРГЕ</h1>
                <p>Комфортабельная квартира посуточно в центре города. Идеально для отдыха и командировок.</p>
            </div>
            <div class="search-panel">
                <div class="search-group">
                    <label>Заезд</label>
                    <div class="input-with-icon">
                        <input type="text" placeholder="Дата заезда">
                        <i data-lucide="calendar"></i>
                    </div>
                </div>
                <div class="search-group">
                    <label>Выезд</label>
                    <div class="input-with-icon">
                        <input type="text" placeholder="Дата выезда">
                        <i data-lucide="calendar"></i>
                    </div>
                </div>
                <div class="search-group">
                    <label>Гостей</label>
                    <select>
                        <option>1-2 гостя</option>
                        <option>3 гостя</option>
                        <option>4 гостя</option>
                    </select>
                </div>
                <button class="btn-search" onclick="location.href='booking.html'">Найти и Забронировать</button>
            </div>
        </div>
    </section>

    <script>lucide.createIcons();</script>
</body>
</html>
