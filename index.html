<style>
    /* ОБНОВЛЕННАЯ СТИЛИЗАЦИЯ HERO ПО МАКЕТУ */
    .hero {
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center; /* Центрирование по вертикали */
        min-height: 100vh; /* Увеличено для соответствия пропорциям макета */
        padding: 60px 0;
    }

    .hero-bg-wrapper {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
    }

    .hero-image-bg {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        /* Убран сильный фильтр brightness, добавлен легкий контраст */
        filter: contrast(1.05); 
    }

    /* Градиентная подложка слева для читаемости БЕЛОГО текста, как на макете */
    .hero::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 60%;
        height: 100%;
        background: linear-gradient(to right, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 100%);
        z-index: 0;
    }

    .hero-card {
        max-width: 650px;
        text-align: left; /* Выравнивание по левому краю как на скрине */
        position: relative;
        z-index: 2;
        margin-left: 0; /* Прижимаем к левой стороне контейнера */
    }

    .hero-card h1 {
        color: #ffffff;
        font-size: 3.5rem;
        line-height: 1.1;
        font-weight: 700;
        text-transform: uppercase;
        margin-bottom: 25px;
        letter-spacing: -1px;
    }

    .hero-card p {
        color: #ffffff;
        font-size: 1.2rem;
        line-height: 1.5;
        font-weight: 400;
        max-width: 500px;
        margin-bottom: 40px;
    }

    /* Стилизация виджета поиска, чтобы он был внизу слева */
    .search-panel {
        position: relative;
        z-index: 2;
        margin-top: 30px;
        background: #fff;
        padding: 10px;
        border-radius: 8px;
        display: inline-block; /* Компактный вид как на скрине */
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    /* Адаптивность */
    @media (max-width: 768px) {
        .hero {
            min-height: 80vh;
            text-align: center;
        }
        .hero-card {
            text-align: center;
            margin: 0 auto;
        }
        .hero::before {
            width: 100%;
            background: rgba(0,0,0,0.4);
        }
        .hero-card h1 {
            font-size: 2.2rem;
        }
    }
</style>

<section class="hero">
    <div class="hero-bg-wrapper">
        <img src="img/lahta.webp" class="hero-image-bg" alt="Апартаменты Свои Дни">
    </div>
    <div class="container">
        <div class="hero-card">
            <h1>ВАШ УЮТНЫЙ УГОЛОК <br> В САНКТ-ПЕТЕРБУРГЕ</h1>
            <p>Комфортабельная квартира посуточно в центре города. Идеально для отдыха и командировок.</p>
            
            <div class="search-panel">
                <div id="hr-widget"></div>
                <script type="module" src="https://homereserve.ru/widget.js"></script>
                <script type="module">
                    window.homereserve.initWidgetSearch({"token":"AeEVhV7jVU"})
                </script>
            </div>
        </div>
    </div>
</section>
